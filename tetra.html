<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetraedro 3D con Three.js</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: sans-serif;
        }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: white;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="info">Usa el mouse para rotar el tetraedro</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. Crear la Escena
        const scene = new THREE.Scene();

        // 2. Crear la Cámara (Campo de visión, Relación de aspecto, plano cercano, plano lejano)
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 4;

        // 3. Crear el Renderizador
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 4. Agregar Controles de órbita (Mouse)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // Suaviza el movimiento

        // 5. Crear la Geometría del Tetraedro
        // El radio es 1.5, el segundo parámetro es el detalle (0 para un tetraedro puro)
        const geometry = new THREE.TetrahedronGeometry(1.5, 0);

        // 6. Crear el Material 
        // Usamos MeshStandardMaterial para que reaccione de forma realista a la luz
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x00ffcc, 
            roughness: 0.4,
            metalness: 0.2,
            flatShading: true // Muestra las caras planas bien definidas
        });

        // Combinar geometría y material en una Malla (Mesh)
        const tetrahedron = new THREE.Mesh(geometry, material);
        scene.add(tetrahedron);

        // Opcional: Agregar un modo "Wireframe" (líneas) encima para resaltar las aristas
        const wireframeMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.3 });
        const wireframe = new THREE.Mesh(geometry, wireframeMaterial);
        tetrahedron.add(wireframe);

        // 7. Iluminación
        const ambientLight = new THREE.AmbientLight(0x333333); // Luz ambiental suave
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5); // Luz direccional (como el sol)
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);

        const pointLight = new THREE.PointLight(0xff00ff, 1, 10); // Luz puntual de color para contraste
        pointLight.position.set(-3, -3, 2);
        scene.add(pointLight);

        // 8. Animación y Renderizado continuo
        function animate() {
            requestAnimationFrame(animate);

            // Rotación automática continua (si no estás arrastrando el mouse)
            if (!controls.state == -1) {
                tetrahedron.rotation.x += 0.005;
                tetrahedron.rotation.y += 0.005;
            }

            controls.update(); // Requerido si enableDamping está activo
            renderer.render(scene, camera);
        }

        // 9. Ajustar al cambiar el tamaño de la ventana
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Iniciar la animación
        animate();
    </script>
</body>
</html>
