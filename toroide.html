<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superficie Cerrada 3D - Three.js</title>
    <style>
        body {
            margin: 0;
            overflow: hidden; /* Elimina barras de desplazamiento */
            background-color: #111;
        }
        canvas {
            display: block;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <script>
        // 1. Crear la Escena, Cámara y Renderizador
        const scene = new THREE.Scene();
        
        // Cámara (Campo de visión, Relación de aspecto, Plano cercano, Plano lejano)
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 15;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Agregar Controles de Órbita (Permite rotar con el mouse y hacer zoom)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);

        // 3. Crear la Geometría de la Superficie Cerrada (Un Toroide / Dona)
        // Parámetros: (Radio principal, Radio del tubo, Segmentos radiales, Segmentos tubulares)
        const geometry = new THREE.TorusGeometry(5, 2, 30, 200);

        // 4. Crear el Material (Usamos Wireframe para ver la estructura de la superficie)
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x00ffcc, 
            wireframe: true, // Muestra las líneas de la malla
            roughness: 0.4,
            metalness: 0.2
        });

        // 5. Crear la Malla (Mesh) uniendo Geometría y Material
        const superficieCerrada = new THREE.Mesh(geometry, material);
        scene.add(superficieCerrada);

        // 6. Iluminación (Esencial para materiales que no sean básicos)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 1);
        pointLight.position.set(10, 10, 10);
        scene.add(pointLight);

        // 7. Función de Animación (Bucle de renderizado)
        function animate() {
            requestAnimationFrame(animate);

            // Rotación suave automática
            superficieCerrada.rotation.x += 0.005;
            superficieCerrada.rotation.y += 0.005;

            // Actualizar controles
            controls.update();

            // Renderizar la escena
            renderer.render(scene, camera);
        }

        // Ejecutar la animación por primera vez
        animate();

        // 8. Ajustar el tamaño si la ventana cambia
        window.addEventListener('resize', onWindowResize, false);

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
