<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superficie 3D con Three.js</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
        }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: white;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="info">Superficie 3D: Paraboloide Hiperbólico (Usa el ratón para rotar/hacer zoom)</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. Configuración de la Escena, Cámara y Renderizador
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 15, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Controles de órbita (Mouse)
        const controls = new OrbitControls(camera, renderer.domElement);

        // 2. Crear la Geometría de la Superficie
        const size = 20; // Tamaño de la cuadrícula
        const segments = 40; // Resolución
        const geometry = new THREE.PlaneGeometry(size, size, segments, segments);

        // Modificar los vértices del plano para aplicar la función matemática
        const positionAttribute = geometry.attributes.position;
        for (let i = 0; i < positionAttribute.count; i++) {
            const x = positionAttribute.getX(i);
            const y = positionAttribute.getY(i);
            
            // Fórmula de la superficie: z = (x^2 - y^2) / 10
            const z = (Math.pow(x, 2) - Math.pow(y, 2)) / 10;
            
            // En Three.js, por defecto el plano usa X e Y, modificamos Z para la altura
            positionAttribute.setZ(i, z);
        }
        // Recalcular normales para que la luz se refleje correctamente
        geometry.computeVertexNormals();

        // 3. Material (Doble cara para verla por arriba y por abajo + modo estructura de alambre)
        const material = new THREE.MeshNormalMaterial({
            side: THREE.DoubleSide,
            wireframe: true // Cambia a false si quieres verla sólida
        });

        // Crear la malla y rotarla para que apunte hacia arriba (eje Z como altura)
        const surface = new THREE.Mesh(geometry, material);
        surface.rotation.x = -Math.PI / 2; 
        scene.add(surface);

        // 4. Agregar ejes de referencia (Rojo: X, Verde: Y, Azul: Z)
        const axesHelper = new THREE.AxesHelper(15);
        scene.add(axesHelper);

        // 5. Animación continua
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Ajustar al cambiar el tamaño de la ventana
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
